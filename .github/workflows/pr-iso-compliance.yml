name: PR ISO Compliance

# ISO 27001 / SOC 2 control: enforce automated unit-test gate on every PR.
# The job name `iso-compliance` is the status-check context required by the
# org-level branch ruleset.

on:
  pull_request:

permissions:
  contents: read

jobs:
  iso-compliance:
    name: iso-compliance
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node_modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci || npm install

      - name: Run unit tests
        run: npm test
